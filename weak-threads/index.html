<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weak Threads</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d14;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  #game-canvas {
    display: block;
  }

  /* Error overlay */
  #error-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13, 13, 20, 0.95);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 100;
    color: #f0f0f5;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    text-align: center;
    padding: 24px;
  }

  #error-overlay.visible {
    display: flex;
  }

  #error-overlay p {
    font-size: 18px;
    color: #ff6b6b;
    max-width: 360px;
    line-height: 1.5;
  }

  #error-overlay button {
    padding: 10px 28px;
    border-radius: 10px;
    border: 1px solid rgba(167, 139, 250, 0.4);
    background: rgba(167, 139, 250, 0.15);
    color: #a78bfa;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }

  #error-overlay button:hover {
    background: rgba(167, 139, 250, 0.3);
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="error-overlay">
  <p>Could not load physics engine. Check your connection.</p>
  <button onclick="location.reload()">Retry</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
  // Check Matter.js loaded successfully
  if (typeof window.Matter === 'undefined') {
    document.getElementById('error-overlay').classList.add('visible');
  } else {
    // Size canvas backing store by devicePixelRatio for crisp rendering
    const canvas = document.getElementById('game-canvas');
    const dpr = window.devicePixelRatio || 1;
    const LOGICAL_W = 800;
    const LOGICAL_H = 600;

    canvas.width = LOGICAL_W * dpr;
    canvas.height = LOGICAL_H * dpr;
    canvas.style.width = LOGICAL_W + 'px';
    canvas.style.height = LOGICAL_H + 'px';

    const ctx = canvas.getContext('2d');
    // Scale context so all drawing coordinates remain in logical pixels
    ctx.scale(dpr, dpr);

    // --- PhysicsEngine ---
    // Thin wrapper around Matter.js. Does NOT use Matter.Runner —
    // the game loop drives physics manually via step(dt).
    class PhysicsEngine {
      init(canvas) {
        this.engine = Matter.Engine.create();
        this.world  = this.engine.world;
      }

      addBody(body) {
        Matter.World.add(this.world, body);
      }

      removeBody(body) {
        Matter.World.remove(this.world, body);
      }

      addConstraint(c) {
        Matter.World.add(this.world, c);
      }

      removeConstraint(c) {
        Matter.World.remove(this.world, c);
      }

      // handler receives the pairs array from the collisionStart event
      onCollisionStart(handler) {
        Matter.Events.on(this.engine, 'collisionStart', e => handler(e.pairs));
      }

      // dt is in seconds; Matter.Engine.update expects milliseconds
      step(dt) {
        Matter.Engine.update(this.engine, dt * 1000);
      }

      clear() {
        Matter.World.clear(this.world, false);
        Matter.Engine.clear(this.engine);
      }
    }

    // ─── Data Model Type Definitions ───────────────────────────────────────

    /**
     * @typedef {Object} AnchorDef
     * @property {string} id
     * @property {number} x
     * @property {number} y
     */

    /**
     * @typedef {Object} ThreadDef
     * @property {string} id
     * @property {string} from  - anchor id OR "gem"
     * @property {string} to    - anchor id OR "gem"
     * @property {number} length
     * @property {number} stiffness  - 0.0–1.0
     */

    /**
     * @typedef {Object} GemDef
     * @property {number} x
     * @property {number} y
     * @property {number} radius
     * @property {string} color
     */

    /**
     * @typedef {Object} BasketDef
     * @property {number} x
     * @property {number} y
     * @property {number} width
     * @property {number} height
     */

    /**
     * @typedef {Object} LevelData
     * @property {number} id
     * @property {string} name
     * @property {AnchorDef[]} anchors
     * @property {ThreadDef[]} threads
     * @property {GemDef} gem
     * @property {BasketDef} basket
     */

    // ─── Level Definitions ─────────────────────────────────────────────────

    /** @type {LevelData[]} */
    const LEVELS = [
      {
        // Level 1: trivial intro — one anchor, one thread, gem hangs directly above basket
        id: 1,
        name: 'First Cut',
        anchors: [
          { id: 'a1', x: 400, y: 80 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 180, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 260, radius: 18, color: '#a78bfa' },
        basket: { x: 360, y: 480, width: 80, height: 40 }
      },
      {
        // Level 2: two anchors, two threads holding gem, basket below-center
        id: 2,
        name: 'Two Ropes',
        anchors: [
          { id: 'a1', x: 250, y: 80 },
          { id: 'a2', x: 550, y: 80 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 220, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 220, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 260, radius: 18, color: '#a78bfa' },
        basket: { x: 360, y: 490, width: 80, height: 40 }
      },
      {
        // Level 3: gem needs to swing into basket on the right side
        id: 3,
        name: 'The Swing',
        anchors: [
          { id: 'a1', x: 160, y: 80 },
          { id: 'a2', x: 400, y: 60 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 200, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 160, stiffness: 0.8 },
          { id: 't3', from: 'a1', to: 'a2', length: 250, stiffness: 0.8 }
        ],
        gem:    { x: 280, y: 240, radius: 18, color: '#a78bfa' },
        basket: { x: 660, y: 460, width: 80, height: 40 }
      },
      {
        // Level 4: three anchors forming a triangle around gem, basket bottom-right
        id: 4,
        name: 'Triangle',
        anchors: [
          { id: 'a1', x: 400, y: 60 },
          { id: 'a2', x: 200, y: 320 },
          { id: 'a3', x: 600, y: 320 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 180, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 180, stiffness: 0.8 },
          { id: 't3', from: 'a3', to: 'gem', length: 180, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 220, radius: 18, color: '#a78bfa' },
        basket: { x: 660, y: 510, width: 80, height: 40 }
      },
      {
        // Level 5: four anchors, five threads forming a complex web, basket bottom-center
        id: 5,
        name: 'Web',
        anchors: [
          { id: 'a1', x: 200, y: 60 },
          { id: 'a2', x: 600, y: 60 },
          { id: 'a3', x: 120, y: 300 },
          { id: 'a4', x: 680, y: 300 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 210, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 210, stiffness: 0.8 },
          { id: 't3', from: 'a3', to: 'gem', length: 190, stiffness: 0.8 },
          { id: 't4', from: 'a4', to: 'gem', length: 190, stiffness: 0.8 },
          { id: 't5', from: 'a1', to: 'a2', length: 400, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 240, radius: 18, color: '#a78bfa' },
        basket: { x: 360, y: 510, width: 80, height: 40 }
      }
    ];

    // ─── LevelManager ──────────────────────────────────────────────────────

    class LevelManager {
      constructor(engine, canvas) {
        this.engine = engine;
        this.canvas = canvas;
        this.currentIndex = 0;
        this.currentLevel = null;
        this.gemBody = null;
        this.basketBody = null;
        this.anchorBodies = {};
        this.activeThreads = [];
        this.cutChains = [];
        this.totalThreads = 0;
        this.gameState = 'LOADING';
        this.starRating = null;
      }

      // Task 4.1 — load a level by index
      loadLevel(index) {
        // Clamp index to valid range
        let clampedIndex = index;
        if (index < 0 || index >= LEVELS.length) {
          console.warn(`loadLevel: index ${index} out of bounds, clamping to [0, ${LEVELS.length - 1}]`);
          clampedIndex = Math.max(0, Math.min(index, LEVELS.length - 1));
        }

        this.engine.clear();

        this.currentIndex = clampedIndex;
        this.currentLevel = LEVELS[clampedIndex];
        this.totalThreads = this.currentLevel.threads.length;

        const level = this.currentLevel;

        // Create anchor static bodies
        this.anchorBodies = {};
        for (const a of level.anchors) {
          const body = Matter.Bodies.circle(a.x, a.y, 8, { isStatic: true, label: 'anchor_' + a.id });
          this.anchorBodies[a.id] = body;
          this.engine.addBody(body);
        }

        // Create gem dynamic body
        const gem = level.gem;
        this.gemBody = Matter.Bodies.circle(gem.x, gem.y, gem.radius, {
          label: 'gem',
          restitution: 0.3,
          friction: 0.1
        });
        this.engine.addBody(this.gemBody);

        // Create basket sensor body
        const basket = level.basket;
        this.basketBody = Matter.Bodies.rectangle(
          basket.x + basket.width / 2,
          basket.y + basket.height / 2,
          basket.width,
          basket.height,
          { isStatic: true, isSensor: true, label: 'basket' }
        );
        this.engine.addBody(this.basketBody);

        // Build rope chains from ThreadDef entries.
        // Each chain is { id, nodes: [Body], links: [Constraint], cutLink: Constraint }
        // nodes[0] is pinned to the anchor (or is the anchor body itself),
        // nodes[last] connects to the gem via cutLink.
        this.activeThreads = [];
        const SEGMENTS = 8; // chain links per rope
        for (const t of level.threads) {
          const resolveBody = (ref) => ref === 'gem' ? this.gemBody : this.anchorBodies[ref];
          const startBody = resolveBody(t.from);
          const endBody   = resolveBody(t.to);

          const sx = startBody.position.x, sy = startBody.position.y;
          const ex = endBody.position.x,   ey = endBody.position.y;
          const segLen = t.length / SEGMENTS;

          // Create intermediate chain nodes
          const nodes = [];
          for (let i = 1; i < SEGMENTS; i++) {
            const frac = i / SEGMENTS;
            const nx = sx + (ex - sx) * frac;
            const ny = sy + (ey - sy) * frac;
            const node = Matter.Bodies.circle(nx, ny, 3, {
              label: 'rope_node',
              collisionFilter: { mask: 0 }, // no collisions with anything
              frictionAir: 0.05,
              mass: 0.1,
            });
            this.engine.addBody(node);
            nodes.push(node);
          }

          // Link: anchor → node[0] → ... → node[last] → gem
          const links = [];
          const allNodes = [startBody, ...nodes, endBody];
          for (let i = 0; i < allNodes.length - 1; i++) {
            const isLastLink = i === allNodes.length - 2;
            const c = Matter.Constraint.create({
              bodyA: allNodes[i],
              bodyB: allNodes[i + 1],
              length: segLen,
              stiffness: isLastLink ? t.stiffness : 0.9,
              damping: 0.1,
              label: isLastLink ? t.id + '_cut' : t.id + '_link' + i,
            });
            this.engine.addConstraint(c);
            links.push(c);
          }

          // The "cut link" is the last constraint (connecting to gem/endBody)
          const cutLink = links[links.length - 1];

          this.activeThreads.push({ id: t.id, nodes, links, cutLink, startBody, endBody });
        }

        this.gameState = 'PLAYING';
        this.starRating = null;
        this.cutChains = [];
      }

      // Task 4.2 — hit test threads at canvas coordinates
      // threads is now an array of RopeChain objects
      hitTestThread(x, y, threads) {
        if (threads.length === 0) return null;

        let closest = null;
        let minDist = 12; // HitThreshold

        for (const chain of threads) {
          // Build the full node list for sampling: startBody + intermediate nodes + endBody
          const allNodes = [chain.startBody, ...chain.nodes, chain.endBody];
          for (let i = 0; i < allNodes.length - 1; i++) {
            const ax = allNodes[i].position.x,   ay = allNodes[i].position.y;
            const bx = allNodes[i+1].position.x, by = allNodes[i+1].position.y;
            // Sample 3 points per segment (start, mid, end)
            for (let s = 0; s <= 2; s++) {
              const t = s / 2;
              const px = ax + (bx - ax) * t;
              const py = ay + (by - ay) * t;
              const dist = Math.sqrt((px - x) * (px - x) + (py - y) * (py - y));
              if (dist < minDist) {
                minDist = dist;
                closest = chain;
              }
            }
          }
        }

        return closest;
      }

      // Task 4.5 — cut a thread (chain version)
      // Removes only the final link connecting to the gem; chain nodes fall freely
      cutThread(chain) {
        this.engine.removeConstraint(chain.cutLink);
        const idx = this.activeThreads.indexOf(chain);
        if (idx !== -1) {
          this.activeThreads.splice(idx, 1);
        }
        this.cutChains.push(chain);
      }

      // Task 4.7 — compute star rating (pure)
      computeStars(totalThreads, threadsRemaining) {
        const ratio = threadsRemaining / totalThreads;
        if (ratio >= 0.67) return 3;
        if (ratio >= 0.34) return 2;
        return 1;
      }

      // Task 4.9 — handle gem caught
      onGemCaught() {
        if (this.gameState !== 'PLAYING') return;
        this.gameState = 'WIN';
        this.starRating = this.computeStars(this.totalThreads, this.activeThreads.length);
      }

      // Task 4.11 — check lose condition (called each frame)
      checkLoseCondition() {
        if (this.gemBody && this.gemBody.position.y > this.canvas.height + 100 && this.gameState === 'PLAYING') {
          this.gameState = 'LOSE';
        }
      }

      // Task 4.12 — advance to next level
      advanceLevel() {
        if (this.currentIndex >= LEVELS.length - 1) {
          this.gameState = 'GAME_COMPLETE';
        } else {
          this.loadLevel(this.currentIndex + 1);
        }
      }
    }

    // ─── Renderer ──────────────────────────────────────────────────────────

    class Renderer {
      constructor() {
        this.ctx = null;
        this.canvas = null;
        this.particles = [];
        this.restartBtnRect = null;
        this.nextBtnRect = null;
      }

      clearCutRopes() { /* no-op, kept for call-site compatibility */ }

      // Task 6.1 — init and drawFrame
      init(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
      }

      drawFrame(state) {
        const ctx = this.ctx;
        const { gameState, currentLevel, gemBody, basketBody, anchorBodies, activeThreads, cutChains, starRating, currentIndex, dt } = state;

        ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
        ctx.fillStyle = '#0d0d14';
        ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

        if (!currentLevel) return;

        this.drawAnchors(ctx, anchorBodies);

        // Draw cut chains (physics-simulated, faded)
        if (cutChains) {
          for (const chain of cutChains) {
            this.drawChain(ctx, chain, 0.4, true);
          }
        }

        // Draw active threads
        for (const chain of activeThreads) {
          this.drawChain(ctx, chain, 1.0, false);
        }

        this.drawBasket(ctx, basketBody, currentLevel.basket);
        this.drawGem(ctx, gemBody, currentLevel.gem);

        this.updateParticles(dt);
        this.drawParticles(ctx);

        this.drawHUD(ctx, state);

        if (gameState === 'WIN') this.drawWinOverlay(ctx, state);
        if (gameState === 'LOSE') this.drawLoseOverlay(ctx);
        if (gameState === 'GAME_COMPLETE') this.drawGameCompleteOverlay(ctx);
      }

      // Draw a rope chain by connecting its nodes with rope-style strokes
      drawChain(ctx, chain, alpha, cut) {
        const allNodes = [chain.startBody, ...chain.nodes, chain.endBody];
        for (let i = 0; i < allNodes.length - 1; i++) {
          const ax = allNodes[i].position.x,   ay = allNodes[i].position.y;
          const bx = allNodes[i+1].position.x, by = allNodes[i+1].position.y;
          this.drawRopeSegment(ctx, ax, ay, bx, by, alpha, cut);
        }
      }

      // Shared rope drawing: thick braided look with a highlight stripe
      // cut=true renders a grey frayed remnant
      drawRopeSegment(ctx, x1, y1, x2, y2, alpha, cut) {
        const baseColor    = cut ? '#4a4060' : '#7c5cbf';
        const midColor     = cut ? '#5a5070' : '#9d7de8';
        const highlightCol = cut ? '#6a6080' : '#c4b0f5';

        ctx.save();
        ctx.globalAlpha = alpha;

        // Thick base strand
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = baseColor;
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.shadowColor = cut ? 'transparent' : '#7c5cbf';
        ctx.shadowBlur = cut ? 0 : 6;
        ctx.stroke();

        // Mid strand (slightly narrower, offset colour)
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = midColor;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 0;
        ctx.stroke();

        // Highlight stripe — thin dashed line to suggest twist
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = highlightCol;
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 8]);
        ctx.lineDashOffset = 0;
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.restore();
      }

      // Task 6.4 — drawGem, drawBasket, drawAnchors
      drawGem(ctx, gemBody, gemDef) {
        ctx.save();
        ctx.shadowColor = gemDef.color;
        ctx.shadowBlur = 20;
        const grad = ctx.createRadialGradient(
          gemBody.position.x, gemBody.position.y, 0,
          gemBody.position.x, gemBody.position.y, gemDef.radius
        );
        grad.addColorStop(0, '#e0d4ff');
        grad.addColorStop(1, gemDef.color);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(gemBody.position.x, gemBody.position.y, gemDef.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      drawBasket(ctx, basketBody, basketDef) {
        ctx.save();
        ctx.strokeStyle = '#34d399';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#34d399';
        ctx.shadowBlur = 10;
        ctx.strokeRect(basketDef.x, basketDef.y, basketDef.width, basketDef.height);
        ctx.restore();
      }

      drawAnchors(ctx, anchorBodies) {
        for (const body of Object.values(anchorBodies)) {
          ctx.save();
          ctx.fillStyle = '#f59e0b';
          ctx.shadowColor = '#f59e0b';
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(body.position.x, body.position.y, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      // Task 6.5 — drawHUD
      drawHUD(ctx, state) {
        const { gameState, currentIndex, starRating } = state;

        // Level label
        ctx.save();
        ctx.font = 'bold 16px sans-serif';
        ctx.fillStyle = '#f0f0f5';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('Level ' + (currentIndex + 1), 16, 8);
        ctx.restore();

        // Star indicators (only show filled stars on WIN)
        const stars = (gameState === 'WIN' && starRating != null) ? starRating : 0;
        ctx.save();
        ctx.font = 'bold 18px sans-serif';
        ctx.textBaseline = 'top';
        for (let i = 0; i < 3; i++) {
          ctx.fillStyle = i < stars ? '#fbbf24' : '#4b5563';
          ctx.textAlign = 'right';
          ctx.fillText('★', LOGICAL_W - 56 - (2 - i) * 22, 8);
        }
        ctx.restore();

        // Restart button
        const btn = { x: LOGICAL_W - 48, y: 8, w: 40, h: 28 };
        this.restartBtnRect = btn;
        ctx.save();
        ctx.fillStyle = 'rgba(167, 139, 250, 0.15)';
        ctx.strokeStyle = 'rgba(167, 139, 250, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 6);
        ctx.fill();
        ctx.stroke();
        ctx.font = 'bold 16px sans-serif';
        ctx.fillStyle = '#a78bfa';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('↺', btn.x + btn.w / 2, btn.y + btn.h / 2);
        ctx.restore();
      }

      // Task 6.6 — overlays
      drawWinOverlay(ctx, state) {
        const { starRating, currentIndex } = state;
        this.drawOverlayBackground(ctx);

        this.drawCenteredText(ctx, 'Level Complete!', LOGICAL_H / 2 - 60, 'bold 36px sans-serif', '#a78bfa');

        // Stars
        const stars = starRating || 0;
        ctx.save();
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let i = 0; i < 3; i++) {
          ctx.fillStyle = i < stars ? '#fbbf24' : '#4b5563';
          ctx.fillText('★', LOGICAL_W / 2 - 40 + i * 40, LOGICAL_H / 2);
        }
        ctx.restore();

        // Next level / You Win button
        const isLastLevel = currentIndex >= LEVELS.length - 1;
        const btnLabel = isLastLevel ? 'You Win!' : 'Next Level →';
        const btnW = 160, btnH = 40;
        const btnX = LOGICAL_W / 2 - btnW / 2;
        const btnY = LOGICAL_H / 2 + 55;
        this.nextBtnRect = { x: btnX, y: btnY, w: btnW, h: btnH };

        ctx.save();
        ctx.fillStyle = 'rgba(167, 139, 250, 0.2)';
        ctx.strokeStyle = '#a78bfa';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(btnX, btnY, btnW, btnH, 8);
        ctx.fill();
        ctx.stroke();
        ctx.font = 'bold 18px sans-serif';
        ctx.fillStyle = '#f0f0f5';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(btnLabel, LOGICAL_W / 2, btnY + btnH / 2);
        ctx.restore();
      }

      drawLoseOverlay(ctx) {
        this.drawOverlayBackground(ctx);
        this.drawCenteredText(ctx, 'Try Again', LOGICAL_H / 2 - 20, 'bold 36px sans-serif', '#ff6b6b');
        this.drawCenteredText(ctx, 'The gem fell...', LOGICAL_H / 2 + 24, '18px sans-serif', '#9ca3af');
      }

      drawGameCompleteOverlay(ctx) {
        this.drawOverlayBackground(ctx);
        this.drawCenteredText(ctx, 'You Beat All Levels!', LOGICAL_H / 2 - 20, 'bold 36px sans-serif', '#fbbf24');
        this.drawCenteredText(ctx, 'Congratulations!', LOGICAL_H / 2 + 28, '22px sans-serif', '#a78bfa');
      }

      // Task 6.7 — particles
      spawnParticles(x, y, type) {
        const color  = type === 'win' ? '#fbbf24' : '#a78bfa';
        const radius = type === 'win' ? 4 : 3;
        const spread = type === 'win' ? 120 : 80;

        // Evict oldest if cap would be exceeded
        while (this.particles.length + 12 > 200) {
          this.particles.shift();
        }

        for (let i = 0; i < 12; i++) {
          this.particles.push({
            x, y,
            vx: (Math.random() - 0.5) * spread * 2,
            vy: (Math.random() - 0.5) * spread * 2,
            life: 1.0,
            color,
            radius
          });
        }
      }

      updateParticles(dt) {
        for (const p of this.particles) {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt * 1.5;
          p.life = Math.max(0, Math.min(1, p.life));
        }
        this.particles = this.particles.filter(p => p.life > 0);
      }

      drawParticles(ctx) {
        ctx.save();
        for (const p of this.particles) {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      // ── Helpers ──────────────────────────────────────────────────────────

      drawCenteredText(ctx, text, y, font, color) {
        ctx.save();
        ctx.font = font;
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.fillText(text, LOGICAL_W / 2, y);
        ctx.restore();
      }

      drawOverlayBackground(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(13, 13, 20, 0.75)';
        ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
        ctx.restore();
      }
    }

    // ─── InputHandler ──────────────────────────────────────────────────────

    class InputHandler {
      constructor() {
        this._cutHandler = null;
        this._canvas = null;
        this._onMouseDown = null;
        this._onTouchStart = null;
      }

      // Register the cut callback
      onCut(handler) {
        this._cutHandler = handler;
      }

      // Attach event listeners to canvas
      attach(canvas) {
        this._canvas = canvas;

        this._onMouseDown = (e) => {
          const { x, y } = this._toCanvasCoords(e.clientX, e.clientY);
          if (this._cutHandler) this._cutHandler(x, y);
        };

        this._onTouchStart = (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const { x, y } = this._toCanvasCoords(touch.clientX, touch.clientY);
          if (this._cutHandler) this._cutHandler(x, y);
        };

        canvas.addEventListener('mousedown', this._onMouseDown);
        canvas.addEventListener('touchstart', this._onTouchStart, { passive: false });
      }

      // Remove event listeners
      detach() {
        if (!this._canvas) return;
        this._canvas.removeEventListener('mousedown', this._onMouseDown);
        this._canvas.removeEventListener('touchstart', this._onTouchStart);
        this._canvas = null;
      }

      // Convert client coordinates to canvas logical pixel space
      _toCanvasCoords(clientX, clientY) {
        const rect = this._canvas.getBoundingClientRect();
        // getBoundingClientRect gives CSS pixel position; canvas CSS size = LOGICAL_W x LOGICAL_H
        // so we just subtract the rect offset (no dpr scaling needed for logical coords)
        const x = (clientX - rect.left) * (LOGICAL_W / rect.width);
        const y = (clientY - rect.top) * (LOGICAL_H / rect.height);
        return { x, y };
      }
    }

    // ─── Bootstrap ─────────────────────────────────────────────────────────

    // Instantiate components
    const engine = new PhysicsEngine();
    engine.init(canvas);

    const renderer = new Renderer();
    renderer.init(canvas);

    const levelManager = new LevelManager(engine, canvas);
    const input = new InputHandler();

    // Task 8.3 — Wire InputHandler.onCut → hitTestThread → cutThread → spawnParticles
    input.onCut((x, y) => {
      if (levelManager.gameState !== 'PLAYING') return;
      const thread = levelManager.hitTestThread(x, y, levelManager.activeThreads);
      if (thread) {
        const mx = (thread.startBody.position.x + thread.endBody.position.x) / 2;
        const my = (thread.startBody.position.y + thread.endBody.position.y) / 2;
        levelManager.cutThread(thread);
        renderer.spawnParticles(mx, my, 'cut');
      }
    });

    input.attach(canvas);

    // Task 8.4 — Wire PhysicsEngine.onCollisionStart → LevelManager.onGemCaught → win overlay
    engine.onCollisionStart((pairs) => {
      for (const pair of pairs) {
        const labels = [pair.bodyA.label, pair.bodyB.label];
        if (labels.includes('gem') && labels.includes('basket')) {
          levelManager.onGemCaught();
          if (levelManager.gemBody) {
            renderer.spawnParticles(
              levelManager.gemBody.position.x,
              levelManager.gemBody.position.y,
              'win'
            );
          }
        }
      }
    });

    // Task 8.1 — Game loop
    let lastTimestamp = null;

    function buildRenderState(dt) {
      return {
        gameState:    levelManager.gameState,
        currentLevel: levelManager.currentLevel,
        gemBody:      levelManager.gemBody,
        basketBody:   levelManager.basketBody,
        anchorBodies: levelManager.anchorBodies,
        activeThreads: levelManager.activeThreads,
        cutChains:    levelManager.cutChains,
        starRating:   levelManager.starRating,
        currentIndex: levelManager.currentIndex,
        dt
      };
    }

    function gameLoop(timestamp) {
      if (lastTimestamp === null) lastTimestamp = timestamp;
      // Clamp dt to (0, 0.05] to prevent spiral-of-death on tab restore
      const dt = Math.min(Math.max((timestamp - lastTimestamp) / 1000, 0), 0.05);
      lastTimestamp = timestamp;

      if (levelManager.gameState === 'PLAYING') {
        engine.step(dt);
        levelManager.checkLoseCondition();
      }

      renderer.drawFrame(buildRenderState(dt));
      requestAnimationFrame(gameLoop);
    }

    // Task 8.5 — Wire restart button and "Try Again" overlay click → loadLevel(currentIndex)
    // Also wire "Next Level" button on win overlay → advanceLevel()
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (LOGICAL_W / rect.width);
      const y = (e.clientY - rect.top) * (LOGICAL_H / rect.height);

      // Restart button (always visible in HUD)
      const rb = renderer.restartBtnRect;
      if (rb && x >= rb.x && x <= rb.x + rb.w && y >= rb.y && y <= rb.y + rb.h) {
        levelManager.loadLevel(levelManager.currentIndex);
        renderer.clearCutRopes();
        return;
      }

      // "Try Again" overlay — click anywhere on lose overlay restarts
      if (levelManager.gameState === 'LOSE') {
        levelManager.loadLevel(levelManager.currentIndex);
        renderer.clearCutRopes();
        return;
      }

      // "Next Level" button on win overlay
      if (levelManager.gameState === 'WIN') {
        const nb = renderer.nextBtnRect;
        if (nb && x >= nb.x && x <= nb.x + nb.w && y >= nb.y && y <= nb.y + nb.h) {
          levelManager.advanceLevel();
          renderer.clearCutRopes();
        }
        return;
      }
    });

    // Touch equivalent for restart/next
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const x = (touch.clientX - rect.left) * (LOGICAL_W / rect.width);
      const y = (touch.clientY - rect.top) * (LOGICAL_H / rect.height);

      const rb = renderer.restartBtnRect;
      if (rb && x >= rb.x && x <= rb.x + rb.w && y >= rb.y && y <= rb.y + rb.h) {
        levelManager.loadLevel(levelManager.currentIndex);
        renderer.clearCutRopes();
        return;
      }

      if (levelManager.gameState === 'LOSE') {
        levelManager.loadLevel(levelManager.currentIndex);
        renderer.clearCutRopes();
        return;
      }

      if (levelManager.gameState === 'WIN') {
        const nb = renderer.nextBtnRect;
        if (nb && x >= nb.x && x <= nb.x + nb.w && y >= nb.y && y <= nb.y + nb.h) {
          levelManager.advanceLevel();
          renderer.clearCutRopes();
        }
        return;
      }
    }, { passive: false });

    // Start the game
    levelManager.loadLevel(0);
    renderer.clearCutRopes();
    requestAnimationFrame(gameLoop);

  } // end else block
</script>
</body>
</html>
