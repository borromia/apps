<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weak Threads</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d14;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  #game-canvas {
    display: block;
  }

  /* Error overlay */
  #error-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13, 13, 20, 0.95);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 100;
    color: #f0f0f5;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    text-align: center;
    padding: 24px;
  }

  #error-overlay.visible {
    display: flex;
  }

  #error-overlay p {
    font-size: 18px;
    color: #ff6b6b;
    max-width: 360px;
    line-height: 1.5;
  }

  #error-overlay button {
    padding: 10px 28px;
    border-radius: 10px;
    border: 1px solid rgba(167, 139, 250, 0.4);
    background: rgba(167, 139, 250, 0.15);
    color: #a78bfa;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }

  #error-overlay button:hover {
    background: rgba(167, 139, 250, 0.3);
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="error-overlay">
  <p>Could not load physics engine. Check your connection.</p>
  <button onclick="location.reload()">Retry</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
  // Check Matter.js loaded successfully
  if (typeof window.Matter === 'undefined') {
    document.getElementById('error-overlay').classList.add('visible');
  } else {
    // Size canvas backing store by devicePixelRatio for crisp rendering
    const canvas = document.getElementById('game-canvas');
    const dpr = window.devicePixelRatio || 1;
    const LOGICAL_W = 800;
    const LOGICAL_H = 600;

    canvas.width = LOGICAL_W * dpr;
    canvas.height = LOGICAL_H * dpr;
    canvas.style.width = LOGICAL_W + 'px';
    canvas.style.height = LOGICAL_H + 'px';

    const ctx = canvas.getContext('2d');
    // Scale context so all drawing coordinates remain in logical pixels
    ctx.scale(dpr, dpr);

    // --- PhysicsEngine ---
    // Thin wrapper around Matter.js. Does NOT use Matter.Runner —
    // the game loop drives physics manually via step(dt).
    class PhysicsEngine {
      init(canvas) {
        this.engine = Matter.Engine.create();
        this.world  = this.engine.world;
      }

      addBody(body) {
        Matter.World.add(this.world, body);
      }

      removeBody(body) {
        Matter.World.remove(this.world, body);
      }

      addConstraint(c) {
        Matter.World.add(this.world, c);
      }

      removeConstraint(c) {
        Matter.World.remove(this.world, c);
      }

      // handler receives the pairs array from the collisionStart event
      onCollisionStart(handler) {
        Matter.Events.on(this.engine, 'collisionStart', e => handler(e.pairs));
      }

      // dt is in seconds; Matter.Engine.update expects milliseconds
      step(dt) {
        Matter.Engine.update(this.engine, dt * 1000);
      }

      clear() {
        Matter.World.clear(this.world, false);
        Matter.Engine.clear(this.engine);
      }
    }

    // ─── Data Model Type Definitions ───────────────────────────────────────

    /**
     * @typedef {Object} AnchorDef
     * @property {string} id
     * @property {number} x
     * @property {number} y
     */

    /**
     * @typedef {Object} ThreadDef
     * @property {string} id
     * @property {string} from  - anchor id OR "gem"
     * @property {string} to    - anchor id OR "gem"
     * @property {number} length
     * @property {number} stiffness  - 0.0–1.0
     */

    /**
     * @typedef {Object} GemDef
     * @property {number} x
     * @property {number} y
     * @property {number} radius
     * @property {string} color
     */

    /**
     * @typedef {Object} BasketDef
     * @property {number} x
     * @property {number} y
     * @property {number} width
     * @property {number} height
     */

    /**
     * @typedef {Object} LevelData
     * @property {number} id
     * @property {string} name
     * @property {AnchorDef[]} anchors
     * @property {ThreadDef[]} threads
     * @property {GemDef} gem
     * @property {BasketDef} basket
     */

    // ─── Level Definitions ─────────────────────────────────────────────────

    /** @type {LevelData[]} */
    const LEVELS = [
      {
        // Level 1: trivial intro — one anchor, one thread, gem hangs directly above basket
        id: 1,
        name: 'First Cut',
        anchors: [
          { id: 'a1', x: 400, y: 80 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 180, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 260, radius: 18, color: '#a78bfa' },
        basket: { x: 360, y: 480, width: 80, height: 40 }
      },
      {
        // Level 2: two anchors, two threads holding gem, basket below-center
        id: 2,
        name: 'Two Ropes',
        anchors: [
          { id: 'a1', x: 250, y: 80 },
          { id: 'a2', x: 550, y: 80 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 220, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 220, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 260, radius: 18, color: '#a78bfa' },
        basket: { x: 360, y: 490, width: 80, height: 40 }
      },
      {
        // Level 3: gem needs to swing into basket on the right side
        id: 3,
        name: 'The Swing',
        anchors: [
          { id: 'a1', x: 160, y: 80 },
          { id: 'a2', x: 400, y: 60 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 200, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 160, stiffness: 0.8 },
          { id: 't3', from: 'a1', to: 'a2', length: 250, stiffness: 0.8 }
        ],
        gem:    { x: 280, y: 240, radius: 18, color: '#a78bfa' },
        basket: { x: 660, y: 460, width: 80, height: 40 }
      },
      {
        // Level 4: three anchors forming a triangle around gem, basket bottom-right
        id: 4,
        name: 'Triangle',
        anchors: [
          { id: 'a1', x: 400, y: 60 },
          { id: 'a2', x: 200, y: 320 },
          { id: 'a3', x: 600, y: 320 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 180, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 180, stiffness: 0.8 },
          { id: 't3', from: 'a3', to: 'gem', length: 180, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 220, radius: 18, color: '#a78bfa' },
        basket: { x: 660, y: 510, width: 80, height: 40 }
      },
      {
        // Level 5: four anchors, five threads forming a complex web, basket bottom-center
        id: 5,
        name: 'Web',
        anchors: [
          { id: 'a1', x: 200, y: 60 },
          { id: 'a2', x: 600, y: 60 },
          { id: 'a3', x: 120, y: 300 },
          { id: 'a4', x: 680, y: 300 }
        ],
        threads: [
          { id: 't1', from: 'a1', to: 'gem', length: 210, stiffness: 0.8 },
          { id: 't2', from: 'a2', to: 'gem', length: 210, stiffness: 0.8 },
          { id: 't3', from: 'a3', to: 'gem', length: 190, stiffness: 0.8 },
          { id: 't4', from: 'a4', to: 'gem', length: 190, stiffness: 0.8 },
          { id: 't5', from: 'a1', to: 'a2', length: 400, stiffness: 0.8 }
        ],
        gem:    { x: 400, y: 240, radius: 18, color: '#a78bfa' },
        basket: { x: 360, y: 510, width: 80, height: 40 }
      }
    ];

    // ─── LevelManager ──────────────────────────────────────────────────────

    class LevelManager {
      constructor(engine, canvas) {
        this.engine = engine;
        this.canvas = canvas;
        this.currentIndex = 0;
        this.currentLevel = null;
        this.gemBody = null;
        this.basketBody = null;
        this.anchorBodies = {};
        this.activeThreads = [];
        this.totalThreads = 0;
        this.gameState = 'LOADING';
        this.starRating = null;
      }

      // Task 4.1 — load a level by index
      loadLevel(index) {
        // Clamp index to valid range
        let clampedIndex = index;
        if (index < 0 || index >= LEVELS.length) {
          console.warn(`loadLevel: index ${index} out of bounds, clamping to [0, ${LEVELS.length - 1}]`);
          clampedIndex = Math.max(0, Math.min(index, LEVELS.length - 1));
        }

        this.engine.clear();

        this.currentIndex = clampedIndex;
        this.currentLevel = LEVELS[clampedIndex];
        this.totalThreads = this.currentLevel.threads.length;

        const level = this.currentLevel;

        // Create anchor static bodies
        this.anchorBodies = {};
        for (const a of level.anchors) {
          const body = Matter.Bodies.circle(a.x, a.y, 8, { isStatic: true, label: 'anchor_' + a.id });
          this.anchorBodies[a.id] = body;
          this.engine.addBody(body);
        }

        // Create gem dynamic body
        const gem = level.gem;
        this.gemBody = Matter.Bodies.circle(gem.x, gem.y, gem.radius, {
          label: 'gem',
          restitution: 0.3,
          friction: 0.1
        });
        this.engine.addBody(this.gemBody);

        // Create basket sensor body
        const basket = level.basket;
        this.basketBody = Matter.Bodies.rectangle(
          basket.x + basket.width / 2,
          basket.y + basket.height / 2,
          basket.width,
          basket.height,
          { isStatic: true, isSensor: true, label: 'basket' }
        );
        this.engine.addBody(this.basketBody);

        // Build constraints from ThreadDef entries
        this.activeThreads = [];
        for (const t of level.threads) {
          const resolveBody = (ref) => ref === 'gem' ? this.gemBody : this.anchorBodies[ref];
          const bodyA = resolveBody(t.from);
          const bodyB = resolveBody(t.to);
          const c = Matter.Constraint.create({
            bodyA,
            bodyB,
            length: t.length,
            stiffness: t.stiffness,
            label: t.id
          });
          this.engine.addConstraint(c);
          this.activeThreads.push(c);
        }

        this.gameState = 'PLAYING';
        this.starRating = null;
      }

      // Task 4.2 — hit test threads at canvas coordinates
      hitTestThread(x, y, threads) {
        if (threads.length === 0) return null;

        let closest = null;
        let minDist = 12; // HitThreshold

        for (const thread of threads) {
          for (let i = 0; i <= 9; i++) {
            const t = i / 9;
            const px = thread.bodyA.position.x + (thread.bodyB.position.x - thread.bodyA.position.x) * t;
            const py = thread.bodyA.position.y + (thread.bodyB.position.y - thread.bodyA.position.y) * t;
            const dist = Math.sqrt((px - x) * (px - x) + (py - y) * (py - y));
            if (dist < minDist) {
              minDist = dist;
              closest = thread;
            }
          }
        }

        return closest;
      }

      // Task 4.5 — cut a thread
      cutThread(thread) {
        this.engine.removeConstraint(thread);
        const idx = this.activeThreads.indexOf(thread);
        if (idx !== -1) {
          this.activeThreads.splice(idx, 1);
        }
      }

      // Task 4.7 — compute star rating (pure)
      computeStars(totalThreads, threadsRemaining) {
        const ratio = threadsRemaining / totalThreads;
        if (ratio >= 0.67) return 3;
        if (ratio >= 0.34) return 2;
        return 1;
      }

      // Task 4.9 — handle gem caught
      onGemCaught() {
        if (this.gameState !== 'PLAYING') return;
        this.gameState = 'WIN';
        this.starRating = this.computeStars(this.totalThreads, this.activeThreads.length);
      }

      // Task 4.11 — check lose condition (called each frame)
      checkLoseCondition() {
        if (this.gemBody && this.gemBody.position.y > this.canvas.height + 100 && this.gameState === 'PLAYING') {
          this.gameState = 'LOSE';
        }
      }

      // Task 4.12 — advance to next level
      advanceLevel() {
        if (this.currentIndex >= LEVELS.length - 1) {
          this.gameState = 'GAME_COMPLETE';
        } else {
          this.loadLevel(this.currentIndex + 1);
        }
      }
    }
  }
</script>
</body>
</html>
