<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weak Threads</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d14;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  #game-canvas {
    display: block;
  }

  /* Error overlay */
  #error-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13, 13, 20, 0.95);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 100;
    color: #f0f0f5;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    text-align: center;
    padding: 24px;
  }

  #error-overlay.visible {
    display: flex;
  }

  #error-overlay p {
    font-size: 18px;
    color: #ff6b6b;
    max-width: 360px;
    line-height: 1.5;
  }

  #error-overlay button {
    padding: 10px 28px;
    border-radius: 10px;
    border: 1px solid rgba(167, 139, 250, 0.4);
    background: rgba(167, 139, 250, 0.15);
    color: #a78bfa;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }

  #error-overlay button:hover {
    background: rgba(167, 139, 250, 0.3);
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="error-overlay">
  <p>Could not load physics engine. Check your connection.</p>
  <button onclick="location.reload()">Retry</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
  // Check Matter.js loaded successfully
  if (typeof window.Matter === 'undefined') {
    document.getElementById('error-overlay').classList.add('visible');
  } else {
    // Size canvas backing store by devicePixelRatio for crisp rendering
    const canvas = document.getElementById('game-canvas');
    const dpr = window.devicePixelRatio || 1;
    const LOGICAL_W = 800;
    const LOGICAL_H = 600;

    canvas.width = LOGICAL_W * dpr;
    canvas.height = LOGICAL_H * dpr;
    canvas.style.width = LOGICAL_W + 'px';
    canvas.style.height = LOGICAL_H + 'px';

    const ctx = canvas.getContext('2d');
    // Scale context so all drawing coordinates remain in logical pixels
    ctx.scale(dpr, dpr);
  }
</script>
</body>
</html>
