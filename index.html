<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps</title>
  <style>
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/regular.otf'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/regular-italic.otf'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/light.otf'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/light-italic.otf'); font-weight: 300; font-style: italic; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/semibold.otf'); font-weight: 600; font-style: normal; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/semibold-italic.otf'); font-weight: 600; font-style: italic; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/bold.otf'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/bold-italic.otf'); font-weight: 700; font-style: italic; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/black.otf'); font-weight: 900; font-style: normal; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/black-italic.otf'); font-weight: 900; font-style: italic; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/thin.otf'); font-weight: 100; font-style: normal; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/thin-italic.otf'); font-weight: 100; font-style: italic; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/hairline.otf'); font-weight: 50; font-style: normal; }
    @font-face { font-family: 'HurmeGeoSans2'; src: url('fonts/hurme-geometric-sans/hairline-italic.otf'); font-weight: 50; font-style: italic; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'HurmeGeoSans2', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 60px;
    }

    /* Blurry background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
    }
    .blob-1 { width: 600px; height: 600px; background: #6c3bff; top: -150px; left: -100px; }
    .blob-2 { width: 500px; height: 500px; background: #ff3b8b; bottom: -100px; right: -80px; }
    .blob-3 { width: 400px; height: 400px; background: #3bbfff; top: 40%; left: 40%; }

    .page-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .page-header {
      text-align: center;
      padding: 48px 60px 0;
    }

    .page-title {
      font-size: 42px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.5px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }

    .page-subtitle {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.02em;
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, 140px);
      gap: 40px;
      padding: 40px 60px 60px;
      justify-content: center;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .app-icon {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
    }

    .app-item:hover .app-icon {
      transform: scale(1.08) translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .app-label {
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      letter-spacing: 0.01em;
    }

    /* Comic Reader Icon */
    .icon-comic {
      width: 100%;
      height: 100%;
    }

    .section-label {
      width: 100%;
      max-width: 600px;
      padding: 0 60px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 8px;
    }

    .divider {
      width: calc(100% - 120px);
      max-width: 600px;
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 4px 0 0;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrap">
    <div class="page-header">
      <h1 class="page-title">Apps</h1>
      <p class="page-subtitle" id="last-visit"></p>
    </div>

    <p class="section-label">Apps</p>
    <div class="divider"></div>
    <div class="grid">

    <a class="app-item" href="./comic-reader/">
      <div class="app-icon">
        <svg class="icon-comic" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#7c3aed"/>
              <stop offset="100%" style="stop-color:#db2777"/>
            </linearGradient>
            <linearGradient id="page-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
              <stop offset="100%" style="stop-color:#f0e6ff;stop-opacity:0.9"/>
            </linearGradient>
            <linearGradient id="panel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.7"/>
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.5"/>
            </linearGradient>
          </defs>

          <!-- Icon background -->
          <rect width="100" height="100" rx="22" fill="url(#bg-grad)"/>

          <!-- Subtle shine -->
          <rect width="100" height="50" rx="22" fill="rgba(255,255,255,0.07)"/>

          <!-- Back page shadow -->
          <rect x="28" y="18" width="46" height="62" rx="5" fill="rgba(0,0,0,0.25)" transform="rotate(4 51 49)"/>

          <!-- Main page -->
          <rect x="22" y="16" width="46" height="62" rx="5" fill="url(#page-grad)"/>

          <!-- Comic panels -->
          <!-- Top-left panel -->
          <rect x="27" y="21" width="18" height="16" rx="2" fill="url(#panel-grad)" stroke="rgba(109,40,217,0.6)" stroke-width="0.8"/>
          <!-- Top-right panel -->
          <rect x="47" y="21" width="16" height="16" rx="2" fill="rgba(236,72,153,0.35)" stroke="rgba(109,40,217,0.6)" stroke-width="0.8"/>
          <!-- Middle full-width panel -->
          <rect x="27" y="40" width="36" height="18" rx="2" fill="rgba(124,58,237,0.2)" stroke="rgba(109,40,217,0.6)" stroke-width="0.8"/>
          <!-- Bottom-left panel -->
          <rect x="27" y="61" width="16" height="12" rx="2" fill="rgba(236,72,153,0.25)" stroke="rgba(109,40,217,0.6)" stroke-width="0.8"/>
          <!-- Bottom-right panel -->
          <rect x="46" y="61" width="17" height="12" rx="2" fill="url(#panel-grad)" stroke="rgba(109,40,217,0.6)" stroke-width="0.8"/>

          <!-- Speed lines in middle panel -->
          <line x1="30" y1="44" x2="38" y2="52" stroke="rgba(109,40,217,0.4)" stroke-width="0.8"/>
          <line x1="33" y1="43" x2="42" y2="51" stroke="rgba(109,40,217,0.3)" stroke-width="0.8"/>
          <line x1="36" y1="42" x2="46" y2="50" stroke="rgba(109,40,217,0.3)" stroke-width="0.8"/>

          <!-- Star burst in top-left panel -->
          <polygon points="36,24 37.2,28 41,28 38,30.5 39.2,34.5 36,32 32.8,34.5 34,30.5 31,28 34.8,28" fill="rgba(250,204,21,0.85)"/>

          <!-- Dots in bottom panels -->
          <circle cx="35" cy="67" r="2" fill="rgba(109,40,217,0.5)"/>
          <circle cx="54" cy="67" r="2" fill="rgba(236,72,153,0.6)"/>
          <circle cx="58" cy="67" r="1.5" fill="rgba(236,72,153,0.4)"/>
        </svg>
      </div>
      <span class="app-label">Comic Reader</span>
    </a>

  </div>
  </div>

  <p class="section-label">Games</p>
  <div class="divider"></div>
  <div class="grid">

    <a class="app-item" href="./unskrew/">
      <div class="app-icon">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
          <defs>
            <linearGradient id="us-bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#f0f9ff"/>
              <stop offset="100%" style="stop-color:#e0f2fe"/>
            </linearGradient>
          </defs>
          <!-- Background -->
          <rect width="100" height="100" rx="22" fill="url(#us-bg)"/>
          <!-- Tube (red) -->
          <rect x="18" y="62" width="26" height="24" rx="3" fill="rgba(239,68,68,0.18)" stroke="#ef4444" stroke-width="2.2"/>
          <!-- Tube (blue) -->
          <rect x="56" y="62" width="26" height="24" rx="3" fill="rgba(59,130,246,0.18)" stroke="#3b82f6" stroke-width="2.2"/>
          <!-- Red ball in tube -->
          <circle cx="31" cy="72" r="8" fill="#ef4444"/>
          <circle cx="28" cy="69" r="2.5" fill="rgba(255,255,255,0.55)"/>
          <!-- Blue ball falling -->
          <circle cx="69" cy="48" r="8" fill="#3b82f6"/>
          <circle cx="66" cy="45" r="2.5" fill="rgba(255,255,255,0.55)"/>
          <!-- Bolt (hex) -->
          <g transform="translate(69,22) rotate(20)">
            <polygon points="0,-9 7.8,-4.5 7.8,4.5 0,9 -7.8,4.5 -7.8,-4.5" fill="#6b7280" stroke="#374151" stroke-width="1.2"/>
            <circle cx="0" cy="0" r="3.5" fill="#9ca3af"/>
            <line x1="-3" y1="0" x2="3" y2="0" stroke="#374151" stroke-width="1.2"/>
            <line x1="0" y1="-3" x2="0" y2="3" stroke="#374151" stroke-width="1.2"/>
          </g>
          <!-- Removed bolt (faded, offset) -->
          <g transform="translate(31,22) rotate(-10)" opacity="0.3">
            <polygon points="0,-9 7.8,-4.5 7.8,4.5 0,9 -7.8,4.5 -7.8,-4.5" fill="#6b7280" stroke="#374151" stroke-width="1.2"/>
          </g>
        </svg>
      </div>
      <span class="app-label">Unskrew</span>
    </a>

    <a class="app-item" href="./weak-threads/">
      <div class="app-icon">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
          <defs>
            <linearGradient id="wt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#1a0a2e"/>
              <stop offset="100%" style="stop-color:#0d1a2e"/>
            </linearGradient>
            <radialGradient id="wt-gem" cx="50%" cy="50%" r="50%">
              <stop offset="0%" style="stop-color:#e0d4ff"/>
              <stop offset="100%" style="stop-color:#a78bfa"/>
            </radialGradient>
          </defs>
          <!-- Background -->
          <rect width="100" height="100" rx="22" fill="url(#wt-bg)"/>
          <!-- Anchor dots -->
          <circle cx="30" cy="18" r="5" fill="#f59e0b" opacity="0.9"/>
          <circle cx="70" cy="18" r="5" fill="#f59e0b" opacity="0.9"/>
          <!-- Rope from left anchor to gem -->
          <line x1="30" y1="18" x2="50" y2="52" stroke="#7c5cbf" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="18" x2="50" y2="52" stroke="#c4b0f5" stroke-width="1" stroke-dasharray="5 7" stroke-linecap="round"/>
          <!-- Rope from right anchor to gem -->
          <line x1="70" y1="18" x2="50" y2="52" stroke="#7c5cbf" stroke-width="3" stroke-linecap="round"/>
          <line x1="70" y1="18" x2="50" y2="52" stroke="#c4b0f5" stroke-width="1" stroke-dasharray="5 7" stroke-linecap="round"/>
          <!-- Cut mark on right rope -->
          <line x1="63" y1="30" x2="59" y2="36" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
          <line x1="59" y1="30" x2="63" y2="36" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
          <!-- Gem -->
          <circle cx="50" cy="52" r="10" fill="url(#wt-gem)"/>
          <!-- Basket -->
          <rect x="34" y="76" width="32" height="14" rx="3" fill="none" stroke="#34d399" stroke-width="2.5"/>
        </svg>
      </div>
      <span class="app-label">Weak Threads</span>
    </a>

  </div>
  </div>

  <script>
    const KEY = 'appsLastVisit';
    const el = document.getElementById('last-visit');

    function formatVisit(ts) {
      const d = new Date(ts);
      const day = d.getDate();
      const suffix = ['th','st','nd','rd'][(day % 100 > 10 && day % 100 < 14) ? 0 : Math.min(day % 10, 3)] || 'th';
      const month = d.toLocaleString('en-GB', { month: 'long' });
      const year = d.getFullYear();
      const time = d.toLocaleString('en-GB', { hour: 'numeric', minute: '2-digit', hour12: true }).toUpperCase();
      return `Last visit on ${day}${suffix} ${month} ${year} ${time}`;
    }

    const prev = localStorage.getItem(KEY);
    if (prev) el.textContent = formatVisit(parseInt(prev, 10));
    localStorage.setItem(KEY, Date.now());
  </script>

</body>
</html>
