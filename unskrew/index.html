<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unskrew</title>
<style>
  @font-face {
    font-family: 'HurmeGeoSans2';
    src: url('../fonts/hurme-geometric-sans/regular.otf') format('opentype');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'HurmeGeoSans2';
    src: url('../fonts/hurme-geometric-sans/bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'HurmeGeoSans2';
    src: url('../fonts/hurme-geometric-sans/semibold.otf') format('opentype');
    font-weight: 600;
    font-style: normal;
  }
  @font-face {
    font-family: 'HurmeGeoSans2';
    src: url('../fonts/hurme-geometric-sans/light.otf') format('opentype');
    font-weight: 300;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    margin: 0;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<script>
  // Size canvas backing store by devicePixelRatio for crisp rendering on high-DPI displays
  const canvas = document.getElementById('game-canvas');
  const dpr = window.devicePixelRatio || 1;
  const LOGICAL_W = 480;
  const LOGICAL_H = 700;

  canvas.width = LOGICAL_W * dpr;
  canvas.height = LOGICAL_H * dpr;
  canvas.style.width = LOGICAL_W + 'px';
  canvas.style.height = LOGICAL_H + 'px';

  const ctx = canvas.getContext('2d');
  // Scale context so all drawing coordinates remain in logical pixels
  ctx.scale(dpr, dpr);

  // ── Level Definition Types ──────────────────────────────────────────────────

  /**
   * @typedef {Object} LevelData
   * @property {number} id
   * @property {string} name
   * @property {PlatformDef[]} platforms
   * @property {BoltDef[]} bolts
   * @property {BallDef[]} balls
   * @property {TubeDef[]} tubes
   */

  /**
   * @typedef {Object} PlatformDef
   * @property {number} x
   * @property {number} y
   * @property {number} width
   * @property {number} height
   * @property {number} [angle]  - radians, default 0
   */

  /**
   * @typedef {Object} BoltDef
   * @property {string} id
   * @property {number} x
   * @property {number} y
   * @property {string[]} holdsBallIds
   */

  /**
   * @typedef {Object} BallDef
   * @property {string} id
   * @property {string} color
   * @property {number} x
   * @property {number} y
   * @property {number} radius
   */

  /**
   * @typedef {Object} TubeDef
   * @property {string} id
   * @property {string} color
   * @property {number} x
   * @property {number} y
   * @property {number} width
   * @property {number} height
   * @property {number} capacity
   */

  // ── Runtime State Types ──────────────────────────────────────────────────────

  /**
   * @typedef {Object} BallState
   * @property {string} id
   * @property {string} color
   * @property {number} x
   * @property {number} y
   * @property {number} radius
   * @property {number} vx
   * @property {number} vy
   * @property {boolean} dynamic
   * @property {boolean} captured
   * @property {string|null} capturedTubeId
   */

  /**
   * @typedef {Object} BoltState
   * @property {string} id
   * @property {number} x
   * @property {number} y
   * @property {string[]} holdsBallIds
   * @property {number} angle
   * @property {boolean} unscrewing
   * @property {number} animTimer
   * @property {boolean} removed
   */

  /**
   * @typedef {Object} TubeState
   * @property {string} id
   * @property {string} color
   * @property {number} x
   * @property {number} y
   * @property {number} width
   * @property {number} height
   * @property {number} capacity
   * @property {string[]} capturedBalls
   */

  /**
   * @typedef {Object} CaptureEvent
   * @property {string} ballId
   * @property {string} tubeId
   * @property {boolean} colorMatch
   */

  /**
   * @typedef {Object} Particle
   * @property {number} x
   * @property {number} y
   * @property {number} vx
   * @property {number} vy
   * @property {number} life
   * @property {string} color
   * @property {number} radius
   */

  // ── Constants ────────────────────────────────────────────────────────────────

  const GRAVITY          = 980;
  const RESTITUTION      = 0.35;
  const FRICTION         = 0.85;
  const TAP_RADIUS       = 24;
  const UNSCREW_DURATION = 0.35;
  const UNSCREW_SPEED    = Math.PI * 4;
  const PARTICLE_CAP     = 200;
  const CANVAS_W         = LOGICAL_W;
  const CANVAS_H         = LOGICAL_H;

  // ── Physics ──────────────────────────────────────────────────────────────────

  class Physics {
    /**
     * Euler-integrate all dynamic, non-captured balls; resolve platform collisions.
     * @param {BallState[]} balls
     * @param {PlatformDef[]} platforms
     * @param {number} dt - seconds, already clamped to (0, 0.05]
     */
    integrate(balls, platforms, dt) {
      for (const ball of balls) {
        if (!ball.dynamic || ball.captured) continue;

        // Apply gravity
        ball.vy += GRAVITY * dt;

        // Euler integrate position
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Resolve platform collisions
        for (const platform of platforms) {
          if (this.circleOverlapsRect(ball, platform)) {
            const { nx, ny, penetration } = this.computeCollisionNormal(ball, platform);
            // Displace ball out of platform
            ball.x += nx * penetration;
            ball.y += ny * penetration;
            // Reflect velocity along normal with restitution
            const dot = ball.vx * nx + ball.vy * ny;
            if (dot < 0) {
              ball.vx -= (1 + RESTITUTION) * dot * nx;
              ball.vy -= (1 + RESTITUTION) * dot * ny;
              // Apply friction to tangential component
              ball.vx *= FRICTION;
              ball.vy *= FRICTION;
            }
          }
        }
      }
    }

    /**
     * Bounce ball off left, right, and top canvas walls.
     * Bottom is intentionally open (balls fall off for lose condition).
     * @param {BallState} ball
     * @param {number} canvasW
     * @param {number} canvasH
     */
    resolveWallBounce(ball, canvasW, canvasH) {
      if (ball.x - ball.radius < 0) {
        ball.x = ball.radius;
        ball.vx = Math.abs(ball.vx) * RESTITUTION;
      }
      if (ball.x + ball.radius > canvasW) {
        ball.x = canvasW - ball.radius;
        ball.vx = -Math.abs(ball.vx) * RESTITUTION;
      }
      if (ball.y - ball.radius < 0) {
        ball.y = ball.radius;
        ball.vy = Math.abs(ball.vy) * RESTITUTION;
      }
      // No bottom bounce — balls fall off screen for lose condition
    }

    /**
     * Detect balls entering tube mouths and capture them.
     * @param {BallState[]} balls
     * @param {TubeState[]} tubes
     * @returns {CaptureEvent[]}
     */
    checkTubeCapture(balls, tubes) {
      const events = [];
      for (const ball of balls) {
        if (!ball.dynamic || ball.captured) continue;
        for (const tube of tubes) {
          if (tube.capturedBalls.length >= tube.capacity) continue;
          // Check if ball center is within tube mouth AABB
          if (
            ball.x >= tube.x &&
            ball.x <= tube.x + tube.width &&
            ball.y >= tube.y &&
            ball.y <= tube.y + tube.height
          ) {
            const colorMatch = ball.color === tube.color;
            events.push({ ballId: ball.id, tubeId: tube.id, colorMatch });
            // Snap ball to rest position inside tube, stacking above prior captures
            ball.x = tube.x + tube.width / 2;
            ball.y = tube.y + tube.height - ball.radius - tube.capturedBalls.length * ball.radius * 2.2;
            ball.vx = 0;
            ball.vy = 0;
            ball.captured = true;
            ball.capturedTubeId = tube.id;
            tube.capturedBalls.push(ball.id);
            break; // ball can only be captured once
          }
        }
      }
      return events;
    }

    /**
     * Standard AABB-circle overlap test.
     * @param {BallState} ball
     * @param {{x:number, y:number, width:number, height:number}} rect
     * @returns {boolean}
     */
    circleOverlapsRect(ball, rect) {
      const cx = Math.max(rect.x, Math.min(ball.x, rect.x + rect.width));
      const cy = Math.max(rect.y, Math.min(ball.y, rect.y + rect.height));
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      return (dx * dx + dy * dy) < (ball.radius * ball.radius);
    }

    /**
     * Returns {nx, ny, penetration} for circle vs AABB.
     * nx, ny is the outward normal from the rect surface toward the ball center.
     * @param {BallState} ball
     * @param {{x:number, y:number, width:number, height:number}} rect
     * @returns {{nx:number, ny:number, penetration:number}}
     */
    computeCollisionNormal(ball, rect) {
      const cx = Math.max(rect.x, Math.min(ball.x, rect.x + rect.width));
      const cy = Math.max(rect.y, Math.min(ball.y, rect.y + rect.height));
      let dx = ball.x - cx;
      let dy = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
      const nx = dx / dist;
      const ny = dy / dist;
      const penetration = ball.radius - dist;
      return { nx, ny, penetration };
    }
  }

  // ── LevelManager ─────────────────────────────────────────────────────────────

  class LevelManager {
    constructor() {
      this.balls = [];
      this.bolts = [];
      this.tubes = [];
      this.platforms = [];
      this.activeBolts = [];  // bolts where removed === false
      this.gameState = 'LOADING';
      this.currentIndex = 0;
    }

    /**
     * Load a level by index, deep-cloning all definitions into runtime state.
     * @param {number} index
     */
    loadLevel(index) {
      if (index < 0 || index >= LEVELS.length) {
        console.warn(`loadLevel: index ${index} out of bounds [0, ${LEVELS.length - 1}], clamping.`);
        index = Math.max(0, Math.min(index, LEVELS.length - 1));
      }
      this.currentIndex = index;
      this.platforms = LEVELS[index].platforms.map(p => ({ ...p }));
      this.balls = LEVELS[index].balls.map(b => ({ ...b, vx: 0, vy: 0, dynamic: false, captured: false, capturedTubeId: null }));
      this.bolts = LEVELS[index].bolts.map(b => ({ ...b, angle: 0, unscrewing: false, animTimer: 0, removed: false }));
      this.tubes = LEVELS[index].tubes.map(t => ({ ...t, capturedBalls: [] }));
      this.activeBolts = [...this.bolts];
      this.gameState = 'PLAYING';
    }

    /**
     * Hit-test a tap against active bolts.
     * @param {number} x
     * @param {number} y
     * @returns {BoltState|null}
     */
    hitTestBolt(x, y) {
      for (const bolt of this.activeBolts) {
        if (bolt.removed) continue;
        if (Math.sqrt((bolt.x - x) ** 2 + (bolt.y - y) ** 2) <= TAP_RADIUS) {
          return bolt;
        }
      }
      return null;
    }

    /**
     * Begin the unscrew animation for a bolt.
     * @param {BoltState} bolt
     */
    unscrewBolt(bolt) {
      bolt.unscrewing = true;
      bolt.animTimer = 0;
    }

    /**
     * Advance bolt unscrew animations by dt seconds.
     * Releases balls when all their holding bolts are removed.
     * @param {number} dt
     */
    updateBoltAnimations(dt) {
      for (const bolt of this.activeBolts) {
        if (!bolt.unscrewing) continue;
        bolt.animTimer += dt;
        bolt.angle += UNSCREW_SPEED * dt;
        if (bolt.animTimer >= UNSCREW_DURATION) {
          bolt.removed = true;
          bolt.unscrewing = false;
          this.activeBolts = this.activeBolts.filter(b => !b.removed);
          for (const ballId of bolt.holdsBallIds) {
            const ball = this.balls.find(b => b.id === ballId);
            if (!ball) continue;
            const allRemoved = this.bolts.filter(b => b.holdsBallIds.includes(ballId)).every(b => b.removed);
            if (allRemoved) {
              ball.dynamic = true;
            }
          }
        }
      }
    }

    /**
     * Called after Physics.checkTubeCapture processes a capture event.
     * @param {CaptureEvent} captureEvent
     */
    onBallCaptured(captureEvent) {
      this.checkWin();
    }

    /**
     * Check whether all balls are captured in color-matching tubes.
     * Sets gameState to WIN or GAME_COMPLETE if so.
     * @returns {boolean}
     */
    checkWin() {
      for (const ball of this.balls) {
        if (!ball.captured) return false;
        const tube = this.tubes.find(t => t.id === ball.capturedTubeId);
        if (!tube || tube.color !== ball.color) return false;
      }
      if (this.currentIndex < LEVELS.length - 1) {
        this.gameState = 'WIN';
      } else {
        this.gameState = 'GAME_COMPLETE';
      }
      return true;
    }

    /**
     * Check whether any ball has fallen off the bottom of the canvas.
     */
    checkLoseCondition() {
      for (const ball of this.balls) {
        if (!ball.captured && ball.dynamic) {
          if (ball.y > CANVAS_H + ball.radius * 2) {
            this.gameState = 'LOSE';
            return;
          }
        }
      }
    }

    /**
     * Return a snapshot of state needed by the Renderer.
     * @returns {Object}
     */
    getRenderState(dt = 0) {
      return {
        balls: this.balls,
        bolts: this.bolts,
        tubes: this.tubes,
        platforms: this.platforms,
        gameState: this.gameState,
        currentIndex: this.currentIndex,
        dt,
      };
    }
  }

  // ── Renderer ─────────────────────────────────────────────────────────────────

  class Renderer {
    constructor() {
      this.ctx = null;
      this.canvas = null;
      this.particles = [];
      this.restartBtnRect = null;
      this.nextBtnRect = null;
    }

    // 7.1 — init(canvas)
    init(canvas) {
      this.canvas = canvas;
      this.ctx = canvas.getContext('2d');
      // DPR scaling is already applied at bootstrap, no need to re-scale here
    }

    // 7.2 — drawFrame(state)
    drawFrame(state) {
      const { balls, bolts, tubes, platforms, gameState, currentIndex, dt = 0 } = state;
      const ctx = this.ctx;
      this.updateParticles(dt);
      this.drawBackground(ctx, CANVAS_W, CANVAS_H);
      for (const p of platforms) { ctx.save(); this.drawPlatform(ctx, p); ctx.restore(); }
      for (const t of tubes) { ctx.save(); this.drawTube(ctx, t); ctx.restore(); }
      for (const b of balls) { ctx.save(); this.drawBall(ctx, b); ctx.restore(); }
      for (const b of bolts) { if (!b.removed) { ctx.save(); this.drawBolt(ctx, b); ctx.restore(); } }
      this.drawParticles(ctx);
      ctx.save(); this.drawHUD(ctx, currentIndex, CANVAS_W); ctx.restore();
      if (gameState === 'WIN') { ctx.save(); this.drawWinOverlay(ctx, currentIndex); ctx.restore(); }
      if (gameState === 'LOSE') { ctx.save(); this.drawLoseOverlay(ctx); ctx.restore(); }
      if (gameState === 'GAME_COMPLETE') { ctx.save(); this.drawGameCompleteOverlay(ctx); ctx.restore(); }
    }

    // 7.3 — drawBackground
    drawBackground(ctx, w, h) {
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(0, 0, w, h);
    }

    // 7.4 — drawPlatform
    drawPlatform(ctx, platform) {
      ctx.fillStyle = '#9ca3af';
      ctx.beginPath();
      ctx.roundRect(platform.x, platform.y, platform.width, platform.height, 6);
      ctx.fill();
    }

    // 7.5 — drawTube
    drawTube(ctx, tube) {
      const { x, y, width, height, color } = tube;
      // Semi-transparent fill
      ctx.fillStyle = color + '33';
      ctx.fillRect(x, y, width, height);
      // Walls (open top)
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x, y);                       // top-left
      ctx.lineTo(x, y + height);              // bottom-left
      ctx.lineTo(x + width, y + height);      // bottom-right
      ctx.lineTo(x + width, y);               // top-right
      ctx.stroke();
    }

    // 7.6 — drawBall
    drawBall(ctx, ball) {
      const grad = ctx.createRadialGradient(
        ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, 0,
        ball.x, ball.y, ball.radius
      );
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.4, ball.color);
      grad.addColorStop(1, ball.color + 'cc');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
      // Subtle border
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // 7.7 — drawBolt
    drawBolt(ctx, bolt) {
      const { x, y, angle } = bolt;
      const R = 12; // hex radius
      ctx.translate(x, y);
      ctx.rotate(angle);
      // Hex body
      ctx.fillStyle = '#6b7280';
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const px = Math.cos(a) * R;
        const py = Math.sin(a) * R;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // Center circle
      ctx.fillStyle = '#9ca3af';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      // Slot cross
      ctx.strokeStyle = '#374151';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-4, 0); ctx.lineTo(4, 0);
      ctx.moveTo(0, -4); ctx.lineTo(0, 4);
      ctx.stroke();
    }

    // 7.8 — drawHUD
    drawHUD(ctx, levelIndex, canvasW) {
      // Level label
      ctx.font = 'bold 16px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#374151';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('Level ' + (levelIndex + 1), 16, 12);
      // Restart button
      const btn = { x: canvasW - 52, y: 8, w: 44, h: 28 };
      this.restartBtnRect = btn;
      ctx.fillStyle = 'rgba(55,65,81,0.1)';
      ctx.strokeStyle = 'rgba(55,65,81,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 6);
      ctx.fill();
      ctx.stroke();
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#374151';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('↺', btn.x + btn.w / 2, btn.y + btn.h / 2);
    }

    // 7.9 — Overlays
    drawOverlayBg(ctx) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }

    drawWinOverlay(ctx, currentIndex) {
      this.drawOverlayBg(ctx);
      ctx.font = 'bold 36px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#16a34a';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Level Complete!', CANVAS_W / 2, CANVAS_H / 2 - 40);
      // Next level button
      const btnW = 160, btnH = 44;
      const btnX = CANVAS_W / 2 - btnW / 2;
      const btnY = CANVAS_H / 2 + 20;
      this.nextBtnRect = { x: btnX, y: btnY, w: btnW, h: btnH };
      ctx.fillStyle = '#16a34a';
      ctx.beginPath();
      ctx.roundRect(btnX, btnY, btnW, btnH, 8);
      ctx.fill();
      ctx.font = 'bold 18px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Next Level →', CANVAS_W / 2, btnY + btnH / 2);
    }

    drawLoseOverlay(ctx) {
      this.drawOverlayBg(ctx);
      ctx.font = 'bold 36px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#dc2626';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Try Again', CANVAS_W / 2, CANVAS_H / 2 - 40);
      ctx.font = '18px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#6b7280';
      ctx.fillText('A ball fell off the board', CANVAS_W / 2, CANVAS_H / 2);
      // Restart button
      const btnW = 140, btnH = 44;
      const btnX = CANVAS_W / 2 - btnW / 2;
      const btnY = CANVAS_H / 2 + 40;
      ctx.fillStyle = '#dc2626';
      ctx.beginPath();
      ctx.roundRect(btnX, btnY, btnW, btnH, 8);
      ctx.fill();
      ctx.font = 'bold 18px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('↺ Restart', CANVAS_W / 2, btnY + btnH / 2);
    }

    drawGameCompleteOverlay(ctx) {
      this.drawOverlayBg(ctx);
      ctx.font = 'bold 32px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#7c3aed';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('You Win!', CANVAS_W / 2, CANVAS_H / 2 - 30);
      ctx.font = '18px HurmeGeoSans2, sans-serif';
      ctx.fillStyle = '#6b7280';
      ctx.fillText('All levels complete!', CANVAS_W / 2, CANVAS_H / 2 + 10);
    }

    // 7.10 — Particle system
    spawnParticles(x, y, color, type) {
      // Evict oldest if cap would be exceeded
      while (this.particles.length + 20 > PARTICLE_CAP) {
        this.particles.shift();
      }
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 60 + Math.random() * 180;
        this.particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          color,
          radius: 3 + Math.random() * 3,
        });
      }
    }

    updateParticles(dt) {
      for (const p of this.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 200 * dt; // gravity on particles
        p.life -= dt * 2.0;
        p.life = Math.max(0, Math.min(1, p.life));
      }
      this.particles = this.particles.filter(p => p.life > 0);
    }

    drawParticles(ctx) {
      ctx.save();
      for (const p of this.particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // ── InputHandler ─────────────────────────────────────────────────────────────

  class InputHandler {
    constructor() {
      this._canvas = null;
      this._tapHandler = null;
      this._onMouseDown = null;
      this._onTouchStart = null;
    }

    /**
     * Attach mouse and touch listeners to the canvas.
     * @param {HTMLCanvasElement} canvas
     */
    attach(canvas) {
      this._canvas = canvas;
      this._onMouseDown = (e) => {
        e.preventDefault();
        const { x, y } = this._toCanvasSpace(e.clientX, e.clientY);
        if (this._tapHandler) this._tapHandler(x, y);
      };
      this._onTouchStart = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const { x, y } = this._toCanvasSpace(touch.clientX, touch.clientY);
        if (this._tapHandler) this._tapHandler(x, y);
      };
      canvas.addEventListener('mousedown', this._onMouseDown);
      canvas.addEventListener('touchstart', this._onTouchStart, { passive: false });
    }

    /**
     * Remove all event listeners from the canvas.
     */
    detach() {
      if (!this._canvas) return;
      this._canvas.removeEventListener('mousedown', this._onMouseDown);
      this._canvas.removeEventListener('touchstart', this._onTouchStart);
      this._canvas = null;
    }

    /**
     * Register the tap callback.
     * @param {(x: number, y: number) => void} handler
     */
    onTap(handler) {
      this._tapHandler = handler;
    }

    /**
     * Convert client coordinates to canvas logical space.
     * @param {number} clientX
     * @param {number} clientY
     * @returns {{x: number, y: number}}
     */
    _toCanvasSpace(clientX, clientY) {
      const rect = this._canvas.getBoundingClientRect();
      const scaleX = LOGICAL_W / rect.width;
      const scaleY = LOGICAL_H / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY,
      };
    }
  }
</script>
</body>
